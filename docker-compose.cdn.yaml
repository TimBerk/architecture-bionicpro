version: "3.8"

volumes:
  minio-data:
  nginx-cache:

services:
  minio:
    image: minio/minio:latest
    command: server --console-address :9001 /data
    environment:
      MINIO_ROOT_USER: "minio"
      MINIO_ROOT_PASSWORD: "minio12345"
    ports:
      - "9010:9000"   # S3 API
      - "9011:9001"   # Console
    volumes:
      - minio-data:/data

  # создаём bucket и (опционально) включаем public read на префикс
  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minio minio12345 &&
      mc mb -p local/reports || true &&
      mc anonymous set download local/reports || true &&
      exit 0
      "

  cdn:
    image: nginx:alpine
    ports:
      - "8003:80"
    volumes:
      - ./bionicpro-cdn/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx-cache:/var/cache/nginx
